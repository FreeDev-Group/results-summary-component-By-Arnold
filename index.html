<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Results summary component</title>
</head>
<body>
    <main class="results-summary" aria-label="Results summary">
    <section class="card">
      <header class="card__result">

        <div class="result__score" role="group" aria-label="Total score">
          <p class="result__score-value">76</p>
          <p class="result__score-out-of">of 100</p>
        </div>

        <div class="result__feedback">
          <h2 class="result__feedback-title">Great</h2>
          <p class="result__feedback-text">
            You scored higher than 65% of <br>the people who have taken <br> these tests.
          </p>
        </div>
        
        
      </header>

      <section class="card__summary">

        <h2 class="summary__title">Summary</h2>

        <ul class="summary__list" role="list">

         <li class="summary__item summary__item--reaction">
            <div class="summary__item-left">
              <img class="summary__icon" src="./assets/images/icon-reaction.svg" alt="Reaction icon" />
              <p class="summary__category">Reaction</p>
            </div>
            <div class="summary__item-right">
              <p class="summary__score"><strong>80</strong> <span class="summary__score-divider">/</span> 100</p>
            </div>
          </li>

          <li class="summary__item summary__item--memory">
            <div class="summary__item-left">
              <img class="summary__icon" src="./assets/images/icon-memory.svg" alt="Memory icon" />
              <p class="summary__category">Memory</p>
            </div>
            <div class="summary__item-right">
              <p class="summary__score"><strong>92</strong> <span class="summary__score-divider">/</span> 100</p>
            </div>
          </li>

          <li class="summary__item summary__item--verbal">
            <div class="summary__item-left">
              <img class="summary__icon" src="./assets/images/icon-verbal.svg" alt="Verbal icon" />
              <p class="summary__category">Verbal</p>
            </div>
            <div class="summary__item-right">
              <p class="summary__score"><strong>61</strong> <span class="summary__score-divider">/</span> 100</p>
            </div>
          </li>

          <li class="summary__item summary__item--visual">
            <div class="summary__item-left">
              <img class="summary__icon" src="./assets/images/icon-visual.svg" alt="Visual icon" />
              <p class="summary__category">Visual</p>
            </div>
            <div class="summary__item-right">
              <p class="summary__score"><strong>72</strong> <span class="summary__score-divider">/</span> 100</p>
            </div>
          </li>

        </ul>
         
      </section>

    </section>
  </main>
</body>
</html>
